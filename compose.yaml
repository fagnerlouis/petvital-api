services:
  postgres:
    image: postgres:16
    container_name: petvital-postgres
    environment:
      POSTGRES_DB: petvital
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
