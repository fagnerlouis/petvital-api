spring.application.name=petvital-api

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/petvital
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Como estamos usando Flyway, o Hibernate apenas valida a estrutura, não a cria.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (Migrations do Banco)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# PERFORMANCE (Java 21)
# ===============================
# Ativando as Virtual Threads como conversamos para máxima escalabilidade!
spring.threads.virtual.enabled=true
