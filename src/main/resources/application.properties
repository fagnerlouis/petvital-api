spring.application.name=petvital-api

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/petvital
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Como estamos usando Flyway, o Hibernate apenas valida a estrutura, não a cria.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (Migrations do Banco)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===============================
# PERFORMANCE (Java 21)
# ===============================
# Ativando as Virtual Threads como conversamos para máxima escalabilidade!
spring.threads.virtual.enabled=true

# ===============================
# JWT (Autenticação)
# ===============================
# A chave é lida da variável de ambiente JWT_SECRET.
# Se a variável não existir, usa o valor padrão (apenas para desenvolvimento local).
# IMPORTANTE: Defina JWT_SECRET como variável de ambiente em produção!
jwt.secret=${JWT_SECRET:cGV0dml0YWwtZGV2LXNlY3JldC1rZXktbG9jYWwtYXBlbmFzLW5hby11c2UtZW0tcHJvZA==}
# Expiração em milissegundos: 28800000 = 8 horas
jwt.expiration=28800000
